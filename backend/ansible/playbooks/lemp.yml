---
- name: Install And Setup LEMP Stack
  hosts: all
  become: yes
  vars:
    php_version: "8.1"
    db_name: "appdb"
    db_user: "appuser"
    db_password: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=16') }}"
    mysql_root_password: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=20') }}"
  
  tasks:
    # 1. Update apt cache
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
    
    # 2. Install Nginx
    - name: Install Nginx
      apt:
        name: nginx
        state: present

    # 3. Install MySQL
    - name: Install MySQL server
      apt:
        name: mysql-server
        state: present

    # 4. Install PHP and PHP-FPM
    - name: Install PHP and PHP-FPM
      apt:
        name:
          - "php{{ php_version }}"
          - "php{{ php_version }}-fpm"
          - "php{{ php_version }}-mysql"
          - "php{{ php_version }}-curl"
          - "php{{ php_version }}-mbstring"
          - "php{{ php_version }}-xml"
        state: present

    # MySQL setup
    - name: Install pip for Python 3
      apt:
        name: python3-pip
        state: present

    - name: Install PyMySQL
      pip:
        name: pymysql
        state: present

    - name: Create application database and user
      shell: |
        mysql -e "CREATE DATABASE IF NOT EXISTS {{ db_name }};"
        mysql -e "CREATE USER IF NOT EXISTS '{{ db_user }}'@'localhost' IDENTIFIED BY '{{ db_password }}';"
        mysql -e "GRANT ALL PRIVILEGES ON {{ db_name }}.* TO '{{ db_user }}'@'localhost';"
        mysql -e "FLUSH PRIVILEGES;"
      become: yes

    - name: Remove anonymous users
      shell: |
        mysql -e "DELETE FROM mysql.user WHERE User='';"
        mysql -e "FLUSH PRIVILEGES;"
      become: yes

    - name: Remove test database
      shell: |
        mysql -e "DROP DATABASE IF EXISTS test;"
      become: yes    
      
    - name: Configure Nginx site for LEMP
      template:
        src: lemp-site.conf.j2
        dest: /etc/nginx/sites-available/default
      notify: restart nginx

    # 8. Configure PHP-FPM
    - name: Configure PHP-FPM
      template:
        src: php-fpm.ini.j2
        dest: "/etc/php/{{ php_version }}/fpm/php.ini"
      notify: restart php-fpm

    # 9. Create test php file
    - name: Create info.php
      copy:
        content: |
          <?php
          phpinfo();
          ?>
        dest: /var/www/html/info.php
        mode: '0644'

    # 10. Start and enable services
    - name: Start and enable Nginx
      systemd:
        name: nginx
        state: started
        enabled: yes

    - name: Start and enable PHP-FPM
      systemd:
        name: "php{{ php_version }}-fpm"
        state: started
        enabled: yes

    - name: Start and enable MySQL
      systemd:
        name: mysql
        state: started
        enabled: yes

  handlers:
    - name: restart nginx
      systemd:
        name: nginx
        state: restarted

    - name: restart php-fpm
      systemd:
        name: "php{{ php_version }}-fpm"
        state: restarted

  # Save credentials in file for sending back to application
  post_tasks:
    - name: Save credentials to file
      copy:
        content: |
          {
            "mysql_root_password": "{{ mysql_root_password }}",
            "database_name": "{{ db_name }}",
            "database_user": "{{ db_user }}",
            "database_password": "{{ db_password }}",
            "website_url": "http://{{ ansible_default_ipv4.address }}",
            "info_url": "http://{{ ansible_default_ipv4.address }}/info.php",
            "ssh_user": "ubuntu",
            "ssh_ip": "{{ ansible_default_ipv4.address }}"
          }
        dest: "/tmp/ansible_credentials.json"
        mode: '0644'