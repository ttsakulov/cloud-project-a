---
- name: Install LEMP stack
  hosts: all
  become: true # My VS code swears at "yes"
  vars:
    db_password: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=12') }}"
    php_version: "8.1"
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
    
    - name: Install Nginx
      apt:
        name: nginx
        state: present

    - name: Start Nginx
      systemd:
        name: nginx
        state: started
        enabled: yes

    - name: Install MySQL and PHP
      apt:
        name:
          - mysql-server
          - php{{ php_version }}-fpm
          - php{{ php_version }}-mysql
          - php{{ php_version }}-curl
          - php{{ php_version }}-mbstring
          - php{{ php_version }}-xml
          - python3-pymysql
        state: present

    - name: Start MySQL
      systemd:
        name: mysql
        state: started
        enabled: yes

    - name: Create application database
      mysql_db:
        name: appdb
        state: present
        login_unix_socket: /var/run/mysqld/mysqld.sock

    - name: Create application user
      mysql_user:
        name: appuser
        password: "{{ db_password }}"
        priv: 'appdb.*:ALL'
        host: localhost
        state: present
        login_unix_socket: /var/run/mysqld/mysqld.sock
      no_log: true

    - name: Configure PHP-FPM to use socket
      lineinfile:
        path: /etc/php/8.1/fpm/pool.d/www.conf
        regexp: '^listen ='
        line: 'listen = /run/php/php8.1-fpm.sock'

    - name: Create test PHP file
      copy:
        content: "<?php phpinfo(); ?>"
        dest: /var/www/html/info.php
        mode: '0644'