---
- name: Deploy n8n automation server (HTTP version)
  hosts: all
  become: yes
  vars:
    n8n_port: 5678
    n8n_host: "{{ ansible_default_ipv4.address }}"

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install prerequisites
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
          - gnupg
        state: present

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: deb [arch=amd64] https://download.docker.com/linux/ubuntu jammy stable
        state: present

    - name: Install Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present

    - name: Start and enable Docker
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes
        
    - name: Create n8n data directory
      file:
        path: /home/ubuntu/.n8n
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    - name: Run n8n container
      docker_container:
        name: n8n
        image: n8nio/n8n:latest
        restart_policy: always
        ports:
          - "{{ n8n_port }}:5678"
        env:
          N8N_HOST: "{{ n8n_host }}"
          N8N_PORT: "{{ n8n_port | string }}"
          N8N_PROTOCOL: "http"
          WEBHOOK_URL: "http://{{ n8n_host }}:{{ n8n_port }}/"
          N8N_SECURE_COOKIE: "false"
        volumes:
          - /home/ubuntu/.n8n:/home/node/.n8n
        user: "1000:1000"
        state: started

    - name: Create info file
      copy:
        content: |
          =========================================
          n8n automation server installed!
          =========================================
          URL: http://{{ n8n_host }}:{{ n8n_port }}
          
          First visit: Create your account to start building workflows.
          
          SSH: ssh -i ~/.ssh/yandex_cloud ubuntu@{{ n8n_host }}
          =========================================
        dest: /home/ubuntu/info.txt
        mode: '0644'

    - name: Open firewall port for n8n
      ufw:
        rule: allow
        port: "{{ n8n_port }}"
        proto: tcp
      ignore_errors: yes