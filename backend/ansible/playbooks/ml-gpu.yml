---
- name: Install Docker and run Jupyter Lab container with ML packages
  hosts: all
  become: yes
  vars:
    jupyter_port: 8888
    # jupyter_password приходит из ansible_runner.py

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install prerequisites
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
          - gnupg
        state: present

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: deb [arch=amd64] https://download.docker.com/linux/ubuntu jammy stable
        state: present

    - name: Install Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present

    - name: Start and enable Docker
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Pull Jupyter datascience notebook image
      docker_image:
        name: jupyter/datascience-notebook
        source: pull

    - name: Run Jupyter Lab container
      docker_container:
        name: jupyter
        image: jupyter/datascience-notebook
        restart_policy: always
        ports:
          - "{{ jupyter_port }}:8888"
        env:
          JUPYTER_TOKEN: "{{ jupyter_password }}"
        volumes:
          - /home/ubuntu/notebooks:/home/jovyan/work

    - name: Wait for container to be ready
      pause:
        seconds: 30

    - name: Install PyTorch (NumPy 2.x compatible)
      command: docker exec jupyter pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
      failed_when: false

    - name: Install TensorFlow (latest, NumPy 2.x compatible)
      command: docker exec jupyter pip install "tensorflow>=2.16.0"
      failed_when: false

    - name: Install NumPy 2.x compatible ML packages
      command: docker exec jupyter pip install --upgrade pandas scikit-learn matplotlib seaborn plotly scipy
      failed_when: false

    - name: Create notebooks directory
      file:
        path: /home/ubuntu/notebooks
        state: directory
        owner: ubuntu
        mode: '0755'

    - name: Create info file
      copy:
        content: |
          =========================================
          ML Stack (Docker) installed!
          =========================================
          Jupyter Lab URL: http://{{ ansible_default_ipv4.address }}:{{ jupyter_port }}
          Password: {{ jupyter_password }}
          
          Installed packages:
          - PyTorch (CPU version)
          - TensorFlow
          - NumPy, Pandas, Matplotlib, Seaborn
          - Scikit-learn, SciPy
          
          SSH: ssh -i ~/.ssh/yandex_cloud ubuntu@{{ ansible_default_ipv4.address }}
          =========================================
        dest: /home/ubuntu/info.txt
        mode: '0644'

    - name: Open firewall port
      ufw:
        rule: allow
        port: "{{ jupyter_port }}"
        proto: tcp
      ignore_errors: yes