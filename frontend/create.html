<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud A | Создать сервер</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-4xl mx-auto px-6 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-3">
                    <div class="w-9 h-9 bg-blue-600 rounded-lg flex items-center justify-center">
                        <i class="fas fa-cloud text-white text-lg"></i>
                    </div>
                    <a href="index.html" class="text-gray-800 font-semibold text-xl">Cloud A</a>
                </div>
                <a href="index.html" class="text-gray-500 hover:text-gray-700 transition text-sm">
                    <i class="fas fa-arrow-left"></i> Назад
                </a>
            </div>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto px-6 py-8">
        <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-8">
            <h1 class="text-2xl font-semibold text-gray-800 mb-2">Создание сервера</h1>
            <p class="text-gray-500 text-sm mb-6">Настройте параметры вашего нового сервера</p>

            <form id="create-form" class="space-y-6">
                <div>
                    <label class="block text-gray-700 text-sm font-medium mb-2">Имя сервера <span
                            class="text-gray-400 text-xs font-normal">(опционально)</span></label>
                    <input type="text" id="name" placeholder="Оставьте пустым для автогенерации"
                        class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-gray-700 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition">
                </div>

                <div>
                    <label class="block text-gray-700 text-sm font-medium mb-2">Стек / Шаблон</label>
                    <select id="template"
                        class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-gray-700 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition cursor-pointer bg-white">
                        <option value="">Загрузка стеков...</option>
                    </select>
                    <div class="mt-2 text-gray-400 text-xs flex items-center gap-1.5">
                        <i class="fas fa-info-circle text-xs"></i>
                        <span id="template-desc">Выберите стек для отображения описания</span>
                    </div>
                </div>

                <div>
                    <div class="flex justify-between mb-2">
                        <label class="text-gray-700 text-sm font-medium">CPU (ядра)</label>
                        <span id="cores-value" class="text-blue-600 text-sm font-mono">2</span>
                    </div>
                    <input type="range" id="cores" min="2" max="8" step="2" value="2"
                        class="w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
                </div>

                <div>
                    <div class="flex justify-between mb-2">
                        <label class="text-gray-700 text-sm font-medium">RAM (ГБ)</label>
                        <span id="memory-value" class="text-blue-600 text-sm font-mono">4</span>
                    </div>
                    <input type="range" id="memory" min="2" max="16" step="2" value="4"
                        class="w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
                </div>

                <div>
                    <div class="flex justify-between mb-2">
                        <label class="text-gray-700 text-sm font-medium">Диск (ГБ)</label>
                        <span id="disk-value" class="text-blue-600 text-sm font-mono">20</span>
                    </div>
                    <input type="range" id="disk" min="20" max="100" step="10" value="20"
                        class="w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
                </div>

                <div>
                    <label class="block text-gray-700 text-sm font-medium mb-2">SSH публичный ключ <span
                            class="text-red-500">*</span></label>
                    <textarea id="ssh_key" rows="3"
                        class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-gray-700 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition font-mono text-sm"
                        placeholder="ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAABAQ..."></textarea>
                    <div class="mt-2 text-gray-400 text-xs">
                        <i class="fas fa-info-circle"></i> Не знаете, как получить SSH ключ?
                        <button type="button" onclick="showSshHelp()"
                            class="text-blue-500 hover:text-blue-600">Инструкция</button>
                    </div>
                </div>

                <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2.5 rounded-lg transition flex items-center justify-center gap-2 font-medium">
                    <i class="fas fa-play"></i> Создать сервер
                </button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000/api';

        const coresSlider = document.getElementById('cores');
        const memorySlider = document.getElementById('memory');
        const diskSlider = document.getElementById('disk');
        const coresValue = document.getElementById('cores-value');
        const memoryValue = document.getElementById('memory-value');
        const diskValue = document.getElementById('disk-value');

        coresSlider.oninput = () => coresValue.textContent = coresSlider.value;
        memorySlider.oninput = () => memoryValue.textContent = memorySlider.value;
        diskSlider.oninput = () => diskValue.textContent = diskSlider.value;

        async function loadTemplates() {
            const select = document.getElementById('template');
            const descSpan = document.getElementById('template-desc');

            try {
                const response = await fetch(`${API_URL}/servers/templates`);
                const templates = await response.json();

                if (!templates || templates.length === 0) {
                    select.innerHTML = '<option value="">Нет доступных стеков</option>';
                    return;
                }

                select.innerHTML = '<option value="">📦 Выберите стек...</option>';

                for (const t of templates) {
                    const option = document.createElement('option');
                    option.value = t.file.replace('.yml', '');
                    option.textContent = t.name;
                    option.dataset.desc = t.description || 'Описание отсутствует';
                    select.appendChild(option);
                }

                select.onchange = () => {
                    const selected = select.options[select.selectedIndex];
                    if (selected && selected.value) {
                        descSpan.innerHTML = `<i class="fas fa-cube mr-1"></i> ${selected.dataset.desc}`;
                    } else {
                        descSpan.innerHTML = 'Выберите стек для отображения описания';
                    }
                };

            } catch (error) {
                select.innerHTML = '<option value="">Ошибка загрузки стеков</option>';
                descSpan.innerHTML = 'Убедитесь, что API запущен на порту 8000';
            }
        }

        document.getElementById('create-form').onsubmit = async (e) => {
            e.preventDefault();

            const template = document.getElementById('template').value;
            const sshKey = document.getElementById('ssh_key').value;
            const btn = e.target.querySelector('button[type="submit"]');  // ← ПЕРЕНЕСТИ СЮДА

            if (!template) {
                alert('Пожалуйста, выберите стек');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-play"></i> Создать сервер';
                return;
            }
            if (!sshKey) {
                alert('Введите SSH публичный ключ');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-play"></i> Создать сервер';
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Создание...';

            const data = {
                template: template,
                cores: parseInt(coresSlider.value),
                memory: parseInt(memorySlider.value),
                disk_size: parseInt(diskSlider.value),
                ssh_public_key: sshKey
            };
            const name = document.getElementById('name').value;
            if (name) data.name = name;

            try {
                const res = await fetch(`${API_URL}/servers`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if (res.ok) {
                    window.location.href = `index.html?new_server=${result.id}`;
                } else {
                    alert('Ошибка: ' + (result.detail || 'Неизвестная ошибка'));
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-play"></i> Создать сервер';
                }
            } catch (error) {
                alert('Ошибка: ' + error.message);
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-play"></i> Создать сервер';
            }
        };

        loadTemplates();

        function showSshHelp() {
            alert(
                "Как получить SSH ключ:\n" +
                "1. Откройте терминал\n" +
                "2. Выполните команду: ssh-keygen -t rsa -b 4096\n" +
                "3. Нажимайте Enter (оставьте все по умолчанию)\n" +
                "4. Скопируйте публичный ключ: cat ~/.ssh/id_rsa.pub\n" +
                "5. Вставьте скопированный ключ в поле выше"
            );
        }
    </script>
</body>

</html>
